name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant gradlew permissions
        run: chmod +x gradlew

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" | base64 -d > androidApp/google-services.json

      - name: Build androidApp debug
        run: ./gradlew :androidApp:assembleDebug --no-daemon -x test

      - name: Listar tareas de verificacion disponibles
        run: ./gradlew :shared:tasks --group=verification --no-daemon

      - name: Run unit tests
        run: ./gradlew :shared:check --no-daemon

      - name: Lint
        run: ./gradlew lint --no-daemon

      - name: Limpiar google-services.json
        if: always()
        run: rm -f androidApp/google-services.json